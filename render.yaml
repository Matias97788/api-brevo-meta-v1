services:
  - type: web
    name: api-brevo-meta
    env: node
    buildCommand: npm ci
    startCommand: npm start
    healthCheckPath: /health
    envVars:
      - key: NODE_ENV
        value: production
      - key: META_ACCESS_TOKEN
        sync: false
      - key: BREVO_API_KEY
        sync: false
      - key: BREVO_LIST_ID
        sync: false
